<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f7fa; margin: 0; padding: 0; }
    .container { max-width: 580px; margin: 40px auto; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .header { background: #64748b; padding: 32px 40px; text-align: center; }
    .header h1 { color: #fff; margin: 0; font-size: 22px; }
    .body { padding: 36px 40px; }
    .cta { text-align: center; margin: 32px 0; }
    .cta a { background: #1E6FBF; color: #fff; text-decoration: none; padding: 14px 32px; border-radius: 8px; font-weight: 600; }
    .footer { background: #f5f7fa; padding: 20px 40px; text-align: center; }
    .footer p { color: #888; font-size: 12px; margin: 4px 0; }
  </style>
</head>
<body>
<div class="container">
  <div class="header"><h1>Appointment Cancelled</h1></div>
  <div class="body">
    <p>Hi <strong th:text="${patientName}">Patient</strong>,</p>
    <p>Your appointment for <strong th:text="${serviceName}">Service</strong> on <strong th:text="${datetime}">Date</strong> has been cancelled.</p>
    <p>We're sorry to see you go. You can book a new appointment at any time.</p>
    <div class="cta"><a th:href="${frontendUrl + '/book'}">Book New Appointment</a></div>
  </div>
  <div class="footer">
    <p>BrightSmile Dental &bull; 123 Smile Avenue, New York, NY 10001</p>
  </div>
</div>
</body>
</html>
